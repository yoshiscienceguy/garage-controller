<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Garage Controller</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    h1 {
      margin-bottom: 6px;
      font-size: 28px;
    }

    p {
      color: #444;
      margin-top: 4px;
    }

    .host {
      background: #f1f1f1;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      margin: 12px 0 20px;
      color: #333;
    }

    button {
      display: block;
      width: 90%;
      margin: 18px auto;
      padding: 26px;
      font-size: 26px;
      border: none;
      border-radius: 14px;
      color: white;
      user-select: none;
      touch-action: manipulation;
    }

    .open {
      background: #2e7d32;
    }

    .stop {
      background: #ef6c00;
      font-size: 30px;
      padding: 32px;
    }

    .close {
      background: #c62828;
    }

    .statusButton {
      background: #1565c0;
      font-size: 18px;
      padding: 16px;
    }

    button:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    #status {
      margin-top: 16px;
      white-space: pre-wrap;
      font-size: 14px;
      color: #333;
      background: #f1f1f1;
      padding: 12px;
      border-radius: 10px;
      min-height: 40px;
      text-align: left;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Garage Controller</h1>
    <p>Tap once. Use STOP to stop movement.</p>

    <div class="host">
      Sending to: <strong>http://garage.local</strong>
    </div>

    <button class="open" onclick="sendCommand('/open')">
      OPEN / UP
    </button>

    <button class="stop" onclick="sendCommand('/stop')">
      STOP
    </button>

    <button class="close" onclick="sendCommand('/close')">
      CLOSE / DOWN
    </button>

    <button class="statusButton" onclick="sendCommand('/status')">
      Check Status
    </button>

    <div id="status">Ready</div>

    <div class="small">
      Testing mode only. Make sure your phone/laptop is on the same Wi-Fi as the D1 Mini.
    </div>
  </div>

  <script>
    const DEVICE_HOST = "http://garage.local";
    const API_KEY = "CHANGE_THIS_KEY";

    async function sendCommand(path) {
      const url = DEVICE_HOST + path + "?key=" + encodeURIComponent(API_KEY);

      document.getElementById("status").innerText =
        "Sending command:\n" + url;

      try {
        const response = await fetch(url, {
          method: "GET",
          mode: "cors"
        });

        const text = await response.text();

        if (!response.ok) {
          document.getElementById("status").innerText =
            "Error:\n" + text;
          return;
        }

        try {
          const data = JSON.parse(text);
          document.getElementById("status").innerText =
            JSON.stringify(data, null, 2);
        } catch {
          document.getElementById("status").innerText = text;
        }

      } catch (err) {
        document.getElementById("status").innerText =
          "Connection error.\n\n" +
          "Possible causes:\n" +
          "- garage.local is not resolving\n" +
          "- D1 Mini is offline\n" +
          "- Phone/laptop is not on the same Wi-Fi\n" +
          "- Browser blocked HTTPS-to-HTTP request if using GitHub Pages\n\n" +
          err;
      }
    }
  </script>
</body>
</html>
